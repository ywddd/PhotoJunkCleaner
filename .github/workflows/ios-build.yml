name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d /Applications/Xcode_15.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          elif [ -d /Applications/Xcode_16.0.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
          else
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version
          xcodebuild -showsdks | grep -i iphone || true

      - name: Resolve project path
        id: proj
        run: |
          set -euo pipefail
          if [ -f "PhotoJunkCleaner.xcodeproj/project.pbxproj" ]; then
            echo "root=." >> "$GITHUB_OUTPUT"
            echo "project=PhotoJunkCleaner.xcodeproj" >> "$GITHUB_OUTPUT"
            echo "scheme=PhotoJunkCleaner" >> "$GITHUB_OUTPUT"
          elif [ -f "PhotoJunkCleaner/PhotoJunkCleaner.xcodeproj/project.pbxproj" ]; then
            echo "root=PhotoJunkCleaner" >> "$GITHUB_OUTPUT"
            echo "project=PhotoJunkCleaner.xcodeproj" >> "$GITHUB_OUTPUT"
            echo "scheme=PhotoJunkCleaner" >> "$GITHUB_OUTPUT"
          else
            echo "Xcode project not found" >&2
            find . -name "*.xcodeproj" -maxdepth 4
            exit 1
          fi

      - name: List schemes
        working-directory: ${{ steps.proj.outputs.root }}
        run: |
          xcodebuild -list -project "${{ steps.proj.outputs.project }}" || true

      - name: Build for iOS Simulator (compile check)
        working-directory: ${{ steps.proj.outputs.root }}
        run: |
          set -euo pipefail
          xcodebuild \
            -project "${{ steps.proj.outputs.project }}" \
            -scheme "${{ steps.proj.outputs.scheme }}" \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/DerivedData-sim \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Build for iOS device (unsigned)
        working-directory: ${{ steps.proj.outputs.root }}
        run: |
          set -euo pipefail
          mkdir -p build/export
          xcodebuild \
            -project "${{ steps.proj.outputs.project }}" \
            -scheme "${{ steps.proj.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData-ios \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

          APP_PATH=$(find build/DerivedData-ios -name "PhotoJunkCleaner.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Built .app not found" >&2
            find build/DerivedData-ios -name "*.app" 2>/dev/null | head -20
            exit 1
          fi
          echo "Found app: $APP_PATH"
          cp -R "$APP_PATH" build/export/PhotoJunkCleaner.app

          mkdir -p build/export/Payload
          cp -R build/export/PhotoJunkCleaner.app build/export/Payload/
          (cd build/export && zip -yr PhotoJunkCleaner-unsigned.ipa Payload)
          rm -rf build/export/Payload
          ls -lh build/export/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PhotoJunkCleaner-unsigned
          path: |
            ${{ steps.proj.outputs.root }}/build/export/PhotoJunkCleaner-unsigned.ipa
            ${{ steps.proj.outputs.root }}/build/export/PhotoJunkCleaner.app
          if-no-files-found: error
          retention-days: 14
